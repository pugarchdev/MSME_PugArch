name: Security CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  security-events: write

jobs:
  security-build-test:
    name: Typecheck, Build, Audit, Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/msme_ci
      JWT_SECRET: ci_jwt_secret_must_be_at_least_32_chars_long
      JWT_ACCESS_SECRET: ci_access_secret_must_be_distinct_and_long_enough
      JWT_REFRESH_SECRET: ci_refresh_secret_must_be_distinct_and_long_enough
      REDIS_URL: redis://localhost:6379
      REDIS_TLS: "false"
      REDIS_PREFIX: msme_ci:
      FRONTEND_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      STORAGE_PROVIDER: cloudinary
      PAYMENT_PROVIDER: bank_transfer

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: msme_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npm run prisma:validate --workspace=backend

      - name: Prisma generate
        run: npx prisma generate --schema backend/prisma/schema.prisma

      - name: Backend typecheck
        run: npm run typecheck --workspace=backend

      - name: Frontend typecheck
        run: npm run typecheck --workspace=frontend

      - name: Security lint
        run: npm run lint:security

      - name: Security tests
        run: npm run test:security

      - name: Static audit evidence checks
        run: npm run security:static

      - name: Production readiness checks
        run: npm run production:check

      - name: Backend build
        run: npm run build --workspace=backend

      - name: Frontend build
        run: npm run build --workspace=frontend

      - name: Dependency audit
        run: npm run audit:deps

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config p/owasp-top-ten --config p/secrets --error

  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dast:
    name: ZAP Baseline DAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ""
        run: |
          npm run dev > ../zap-frontend.log 2>&1 &
          for i in {1..60}; do
            curl -fsS http://localhost:3000 >/dev/null && exit 0
            sleep 2
          done
          cat ../zap-frontend.log
          exit 1

      - name: Run ZAP baseline
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:3000
          cmd_options: "-a -m 3"
