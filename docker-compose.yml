version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: msme_postgres
    environment:
      POSTGRES_USER: msme_user
      POSTGRES_PASSWORD: msme_password
      POSTGRES_DB: msme_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: msme_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    container_name: msme_valkey
    profiles:
      - valkey
    ports:
      - "6380:6379"
    volumes:
      - valkey_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  valkey_data:
